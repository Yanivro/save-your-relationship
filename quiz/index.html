<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<title>True Contact</title>
<meta name="robots" content="noindex" />
<script>
  (function () {
    var base = "https://thetruecontact.com/save-your-relationship/quiz/";
    var src = "short", med = "shortlink";
    var p = new URLSearchParams(location.search);
    var out = new URLSearchParams();
    out.set("utm_source", src);
    out.set("utm_medium", med);
    out.set("utm_campaign", p.get("c") || "general");
    // explicit utm_* in the link override the baked defaults
    ["utm_source","utm_medium","utm_campaign","utm_content","utm_term"].forEach(function (k) {
      if (p.has(k)) out.set(k, p.get(k));
    });
    location.replace(base + "?" + out.toString());
  })();
</script>
<meta http-equiv="refresh" content="0; url=/save-your-relationship/quiz/?utm_source=short&amp;utm_medium=shortlink&amp;utm_campaign=general" />
<link rel="canonical" href="https://thetruecontact.com/save-your-relationship/quiz/" />

</body></html>
